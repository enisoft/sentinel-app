name: sentinel_app
description: App móvel offline-first do ecossistema Sentinel (Flutter/Android).
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  get_it: ^8.0.3
  supabase_flutter: ^2.9.1
  http: ^1.4.0
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^10.3.1
  tus_client_dart: 2.5.0
  cross_file: ^0.3.5+2
  camera: ^0.11.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.1
  crypto: ^3.0.6
  wakelock_plus: ^1.6.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.4.15
  sqlite3: ^2.7.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: docs/icon-relato-1024.png
  adaptive_icon_background: "#FFD51F"
  adaptive_icon_foreground: docs/icon-relato-black-transparent-1024.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: docs/icon-adaptative-foreground-relato-1024.png
  color_dark: "#000000"
  image_dark: docs/icon-adaptative-foreground-relato-1024.png
  android: true
  ios: false
  android_12:
    color: "#000000"
    image: docs/icon-adaptative-foreground-relato-1024.png
    color_dark: "#000000"
    image_dark: docs/icon-adaptative-foreground-relato-1024.png

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - .env.dev.example
    - .env.prod.example
    - .env.dev
    - .env.prod
    - docs/favicon.png
