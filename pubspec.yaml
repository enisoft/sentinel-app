name: sentinel_app
description: App móvel offline-first do ecossistema Sentinel (Flutter/Android).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  get_it: ^8.0.3
  supabase_flutter: ^2.9.1
  http: ^1.4.0
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.4.15
  sqlite3: ^2.7.5

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - .env
